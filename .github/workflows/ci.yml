name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskewr
          POSTGRES_USER: taskewr
          POSTGRES_PASSWORD: taskewr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskewr -d taskewr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://taskewr:taskewr@localhost:5432/taskewr?schema=public
      SESSION_SECRET: ci-session-secret-that-is-long-enough-for-production-checks
      TASKEWR_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:migrate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build:prod

      - name: Seed smoke data
        run: npm run prisma:seed

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          npm run start > /tmp/taskewr-next.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS "$TASKEWR_BASE_URL/api/v1/health" > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/taskewr-next.log
              exit 1
            fi
            sleep 2
          done
          npm run smoke:auth
          npm run smoke:browser
